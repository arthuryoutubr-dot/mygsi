name: Test GoFile Upload

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Generate Test File
        run: |
          mkdir -p Output
          echo "FoxetGSI Test Upload" > Output/test.txt
          dd if=/dev/urandom of=Output/random.bin bs=1M count=5

      - name: Show Files
        run: |
          ls -lah Output

      - name: Upload Using uploadgofile.sh
        env:
          GOFILE_API_KEY: ${{ secrets.GOFILE_API_KEY }}
        run: |
          chmod +x uploadgofile.sh

          FILE=$(ls Output/* | head -n 1)

          echo "Uploading: $FILE"

          bash uploadgofile.sh "$FILE"
